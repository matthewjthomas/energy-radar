<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Energy Radar{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/flatpickr/dist/flatpickr.min.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
  <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns@3"></script>
  <script src="https://cdn.jsdelivr.net/npm/flatpickr"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <span class="brand-icon">&#9889;</span>
        <span class="brand-name">Energy Radar</span>
      </div>
      <nav class="nav">
        <a href="/" class="nav-link">Dashboard</a>
        <a href="/history" class="nav-link">History</a>
        <a href="/settings" class="nav-link">Settings</a>
      </nav>
      <div class="sidebar-footer">
        <div id="temp-unit-toggle" class="unit-toggle">
          <button type="button" data-unit="F">&deg;F</button>
          <button type="button" data-unit="C">&deg;C</button>
        </div>
        <span id="ha-status-pill" class="pill pill-unknown">HA: checking&hellip;</span>
      </div>
    </aside>
    <main class="content">
      {% block content %}{% endblock %}
    </main>
  </div>
  <script src="/static/js/api.js"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
