{% extends "base.html" %}
{% block title %}History · Energy Radar{% endblock %}
{% block content %}
  <header class="page-header">
    <div>
      <h1>History</h1>
      <p class="subtitle">Browse any date range and mark changes that may have affected usage.</p>
    </div>
    <div class="range-picker">
      <input id="range-input" placeholder="Select date range&hellip;" readonly />
    </div>
  </header>

  <section class="panel">
    <h2>Usage vs. Weather</h2>
    <div class="chart-wrap"><canvas id="usage-weather-chart"></canvas></div>
  </section>

  <section class="two-col">
    <div class="panel">
      <h2>Detected trend shifts</h2>
      <div id="trend-list" class="insights-list"></div>
    </div>
    <div class="panel">
      <h2>Event markers</h2>
      <form id="event-form" class="stacked-form">
        <label>Date <input type="date" id="event-date" required /></label>
        <label>Title <input type="text" id="event-title" placeholder="e.g. Installed heat pump" required /></label>
        <label>Notes <textarea id="event-description" rows="2"></textarea></label>
        <button type="submit">Add marker</button>
      </form>
      <div id="event-list" class="insights-list"></div>
    </div>
  </section>
{% endblock %}
{% block scripts %}
  <script src="/static/js/charts.js"></script>
  <script src="/static/js/history.js"></script>
{% endblock %}
